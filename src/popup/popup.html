<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Immodex</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="pkdx-body">
    <header class="pkdx-header">
      <div class="pkdx-lens" aria-hidden="true">
        <span class="pkdx-lens-glint"></span>
      </div>
      <div class="pkdx-header-text">
        <h1>IMMODEX</h1>
        <p class="subtitle">Registre ADEME · Cadastre IGN</p>
      </div>
    </header>

    <div class="pkdx-screen">
      <div class="mode-toggle" role="tablist">
        <button type="button" id="mode-dpe" class="mode-btn active" role="tab">DPE</button>
        <button type="button" id="mode-land" class="mode-btn" role="tab">TERRAIN</button>
      </div>

      <form id="dpe-form" autocomplete="off">
        <div class="row">
          <label>Code postal
            <input type="text" name="postal" maxlength="5" inputmode="numeric" required />
          </label>
          <label>Surface (m²)
            <input type="number" name="surface" min="1" max="2000" required />
          </label>
        </div>
        <div class="row">
          <label>Classe énergie
            <select name="energyClass">
              <option value="">—</option>
              <option>A</option><option>B</option><option>C</option><option>D</option>
              <option>E</option><option>F</option><option>G</option>
            </select>
          </label>
          <label>Classe GES
            <select name="gesClass">
              <option value="">—</option>
              <option>A</option><option>B</option><option>C</option><option>D</option>
              <option>E</option><option>F</option><option>G</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>Type
            <select name="buildingType">
              <option value="">—</option>
              <option value="appartement">Appartement</option>
              <option value="maison">Maison</option>
            </select>
          </label>
          <label>Date DPE
            <input type="text" name="date" placeholder="JJ/MM/AAAA, MM/AAAA, AAAA" />
          </label>
        </div>
        <button type="submit" id="dpe-submit">RECHERCHER</button>
      </form>

      <form id="land-form" class="hidden" autocomplete="off">
        <div class="row">
          <label>Code postal
            <input type="text" name="postal" maxlength="5" inputmode="numeric" required />
          </label>
          <label>Surface terrain (m²)
            <input type="number" name="surface" min="1" max="999999" required />
          </label>
        </div>
        <div class="row">
          <label>Ville (facultatif)
            <input type="text" name="city" />
          </label>
          <label>Section (facultatif)
            <input type="text" name="section" maxlength="2" />
          </label>
        </div>
        <button type="submit" id="land-submit">RECHERCHER</button>
      </form>

      <section id="status" class="status hidden"></section>
      <section id="results"></section>
    </div>

    <footer class="pkdx-footer">
      <a id="gh-link" href="https://github.com/tonoid/immodex" target="_blank" rel="noopener noreferrer" title="GitHub">

      </a>
      <a href="https://www.tonoid.com/fr" target="_blank" rel="noopener" id="tonoid-link">by tonoïd</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
